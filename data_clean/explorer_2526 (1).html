<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Football Explorer 2025/26</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090d;--bg2:#0c1118;--card:#0f1820;--card2:#131f2a;
  --b1:#1a2a38;--b2:#243447;
  --gr:#00e676;--gdim:rgba(0,230,118,.09);--gg:rgba(0,230,118,.18);
  --cy:#29d9f5;--am:#ffb300;--rd:#ff5252;--pu:#b07fff;
  --t1:#ddeaf5;--t2:#7a9bb5;--t3:#3d5870;
  --fh:"Barlow Condensed",sans-serif;--fb:"Barlow",sans-serif;--fm:"JetBrains Mono",monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--fb);display:flex;flex-direction:column}
#topbar{flex-shrink:0;height:52px;padding:0 22px;border-bottom:1px solid var(--b1);
  background:linear-gradient(180deg,rgba(0,230,118,.05),transparent);
  display:flex;align-items:center;gap:14px;z-index:100}
.logo{width:32px;height:32px;background:var(--gr);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px var(--gg);flex-shrink:0}
#topbar h1{font-family:var(--fh);font-size:19px;font-weight:900;letter-spacing:.07em;text-transform:uppercase;color:#fff;white-space:nowrap}
#topbar h1 span{color:var(--gr)}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-left:4px}
.pill{font-family:var(--fm);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--b2);color:var(--t2);background:var(--card);letter-spacing:.03em}
.pill.g{border-color:rgba(0,230,118,.4);color:var(--gr);background:var(--gdim)}
.pill.s{border-color:rgba(255,179,0,.35);color:var(--am);background:rgba(255,179,0,.07)}
#layout{flex:1;display:flex;overflow:hidden}
#sidebar{width:256px;flex-shrink:0;border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}
#content{flex:1;overflow-y:auto;padding:22px 26px 50px}
#content::-webkit-scrollbar{width:5px}
#content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
#sw{padding:11px 13px;border-bottom:1px solid var(--b1);flex-shrink:0}
#search{width:100%;padding:7px 11px;background:var(--card);border:1px solid var(--b2);border-radius:7px;color:var(--t1);font-family:var(--fm);font-size:12px;outline:none;transition:border-color .2s}
#search:focus{border-color:rgba(0,230,118,.5)}
#search::placeholder{color:var(--t3)}
#navlist{flex:1;overflow-y:auto;padding-bottom:16px}
#navlist::-webkit-scrollbar{width:3px}
#navlist::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.ngl{padding:9px 13px 3px;font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);border-top:1px solid var(--b1);margin-top:3px;display:flex;align-items:center;gap:6px}
.ngl:first-child{border-top:none;margin-top:0}
.ngl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ni{display:flex;align-items:center;gap:7px;padding:6px 13px;cursor:pointer;transition:background .12s;border-left:2px solid transparent}
.ni:hover{background:rgba(0,230,118,.04);border-left-color:rgba(0,230,118,.25)}
.ni.active{background:var(--gdim);border-left-color:var(--gr)}
.ni-name{font-family:var(--fh);font-size:13px;font-weight:600;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni.active .ni-name{color:var(--gr)}
.ni-b{font-family:var(--fm);font-size:9px;color:var(--t3);flex-shrink:0}
.panel{display:none}.panel.active{display:block}
.phdr{margin-bottom:20px}
.phdr h2{font-family:var(--fh);font-size:26px;font-weight:900;letter-spacing:.04em;color:#fff;line-height:1.1}
.phdr .sub{font-family:var(--fm);font-size:10px;color:var(--t3);margin-top:4px;letter-spacing:.04em}
.ltag{display:inline-block;font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid var(--b2);color:var(--t2);background:var(--card);margin-bottom:7px}
.sg5{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:20px}
.sc{background:var(--card);border:1px solid var(--b1);border-radius:9px;padding:14px 16px;transition:border-color .2s,transform .15s}
.sc:hover{border-color:var(--b2);transform:translateY(-1px)}
.sc-v{font-family:var(--fh);font-size:32px;font-weight:900;line-height:1;color:#fff}
.sc-v .u{font-size:15px;color:var(--gr);font-weight:700}
.sc-v .p{font-size:16px;color:var(--t2)}
.sc-l{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);margin-top:4px}
.sc-s{font-family:var(--fm);font-size:9px;color:var(--t3);margin-top:3px}
.sc.ov{border-top:2px solid rgba(0,230,118,.4)}
.sc.bt{border-top:2px solid rgba(41,217,245,.4)}
.sc.am{border-top:2px solid rgba(255,179,0,.4)}
.wdl{margin-bottom:20px}
.wdl-lbl{font-family:var(--fh);font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--t3);margin-bottom:7px}
.wdl-bar{display:flex;height:34px;border-radius:7px;overflow:hidden}
.ws{display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:12px;font-weight:800;min-width:40px}
.ws.w{background:var(--gr);color:#07090d}
.ws.d{background:#14222e;color:var(--t2);border-left:1px solid var(--b2);border-right:1px solid var(--b2)}
.ws.l{background:#120e1a;color:var(--rd)}
.wdl-leg{display:flex;gap:14px;margin-top:6px;font-family:var(--fm);font-size:10px;color:var(--t3)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.slbl{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.slbl::before{content:"";display:block;width:13px;height:2px;background:var(--gr)}
.tw{border:1px solid var(--b1);border-radius:9px;overflow:hidden;margin-bottom:22px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-family:var(--fh);font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);padding:8px 11px;text-align:left;border-bottom:1px solid var(--b1);background:var(--card2);white-space:nowrap;user-select:none;transition:color .15s}
th.sortable{cursor:pointer}th.sortable:hover{color:var(--t2)}
th.r,td.r{text-align:right}th.c,td.c{text-align:center}
tbody tr{border-bottom:1px solid rgba(26,42,56,.5);transition:background .1s;cursor:pointer}
tbody tr:hover{background:rgba(0,230,118,.04)}
tbody tr:last-child{border-bottom:none}
td{padding:8px 11px;color:var(--t1)}
td.bold{font-family:var(--fh);font-size:13px;font-weight:700;color:#fff}
td.mono{font-family:var(--fm);font-size:11px;color:var(--t2)}
td.dim{color:var(--t3)!important}
.gr{color:var(--gr)!important}.am2{color:var(--am)!important}.rd2{color:var(--rd)!important}
.bdg{display:inline-flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;white-space:nowrap}
.bdg.ov{background:rgba(0,230,118,.13);color:var(--gr);border:1px solid rgba(0,230,118,.28)}
.bdg.un{background:rgba(255,82,82,.08);color:var(--rd);border:1px solid rgba(255,82,82,.2)}
.bdg.yy{background:rgba(41,217,245,.1);color:var(--cy);border:1px solid rgba(41,217,245,.22)}
.bdg.nn{background:rgba(26,42,56,.9);color:var(--t3);border:1px solid var(--b1)}
.bdg.bw{background:rgba(0,230,118,.11);color:var(--gr);border:1px solid rgba(0,230,118,.22)}
.bdg.bd{background:rgba(255,179,0,.09);color:var(--am);border:1px solid rgba(255,179,0,.2)}
.bdg.bl{background:rgba(255,82,82,.09);color:var(--rd);border:1px solid rgba(255,82,82,.18)}
.pb{display:flex;align-items:center;gap:6px;min-width:80px}
.pbt{flex:1;height:3px;background:var(--b1);border-radius:2px;overflow:hidden;min-width:44px}
.pbf{height:100%;border-radius:2px;background:var(--gr)}
.pbf.c{background:var(--cy)}.pbf.a{background:var(--am)}
.pbv{font-family:var(--fm);font-size:10px;color:var(--t1);min-width:30px;text-align:right}
.frow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.fsel{padding:5px 11px;background:var(--card2);border:1px solid var(--b2);border-radius:6px;color:var(--t2);font-family:var(--fm);font-size:11px;outline:none;cursor:pointer}
.fsel:focus{border-color:rgba(0,230,118,.4)}
.fcount{font-family:var(--fm);font-size:10px;color:var(--t3);margin-left:auto}
.lcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:11px;margin-bottom:22px}
.lcard{background:var(--card);border:1px solid var(--b1);border-radius:9px;padding:14px 16px;transition:border-color .2s}
.lcard:hover{border-color:var(--b2)}
.lc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.lc-name{font-family:var(--fh);font-size:14px;font-weight:800;letter-spacing:.02em}
.lc-p{font-family:var(--fm);font-size:10px;color:var(--t3)}
.lc-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(26,42,56,.5)}
.lc-row:last-child{border-bottom:none}
.lc-lbl{font-family:var(--fb);font-size:11px;color:var(--t2)}
.lc-val{font-family:var(--fm);font-size:11px;font-weight:600}
.lc-val.g{color:var(--gr)}.lc-val.c{color:var(--cy)}.lc-val.a{color:var(--am)}
.rank-bar{display:flex;align-items:center;gap:7px}
.rbt{width:55px;height:3px;background:var(--b1);border-radius:2px;overflow:hidden;flex-shrink:0}
.rbf{height:100%;border-radius:2px}
#moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
#moverlay.show{display:flex}
#modal{background:var(--card);border:1px solid var(--b2);border-radius:13px;width:540px;max-width:95vw;padding:26px;position:relative;animation:popIn .18s ease}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
#mcls{position:absolute;top:13px;right:15px;background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;line-height:1}
#mcls:hover{color:var(--t1)}
.m-date{font-family:var(--fm);font-size:10px;color:var(--t3);margin-bottom:4px}
.m-liga{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:13px}
.m-sb{display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.m-team{flex:1;text-align:center}
.m-tname{font-family:var(--fh);font-size:16px;font-weight:800;color:#fff;margin-bottom:3px}
.m-trole{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:.06em}
.m-score{font-family:var(--fh);font-size:52px;font-weight:900;color:#fff;padding:0 18px;line-height:1}
.m-dash{color:var(--t3);font-size:32px;padding:0 5px}
.m-res{text-align:center;margin-bottom:14px;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.m-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.mst{background:var(--card2);border:1px solid var(--b1);border-radius:7px;padding:11px;text-align:center}
.mst-v{font-family:var(--fh);font-size:20px;font-weight:900;color:#fff;line-height:1}
.mst-l{font-family:var(--fm);font-size:9px;color:var(--t3);margin-top:3px}
.m-bdgs{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
@media(max-width:900px){#sidebar{width:210px}.sg5{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){#sidebar{display:none}.sg5{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">⚽</div>
  <h1>Football <span>Explorer</span></h1>
  <div class="pills">
    <span class="pill g">● DATOS REALES</span>
    <span class="pill s">2025 / 26</span>
    <span class="pill" id="pt"></span>
    <span class="pill" id="pe"></span>
    <span class="pill" id="pl"></span>
  </div>
</div>
<div id="layout">
  <div id="sidebar">
    <div id="sw"><input id="search" type="text" placeholder="🔍  Buscar equipo..." oninput="filterNav(this.value)"></div>
    <div id="navlist"></div>
  </div>
  <div id="content">

    <div class="panel active" id="panel-home">
      <div class="phdr"><h2>Resumen 2025/26</h2><div class="sub">12 LIGAS · 7 PAÍSES · TEMPORADA EN CURSO</div></div>
      <div class="slbl">Por Liga</div>
      <div class="lcards" id="lc-home"></div>
      <div class="slbl">Todos los Equipos</div>
      <div class="frow">
        <select class="fsel" id="all-liga" onchange="renderAllTeams()"><option value="">Todas las ligas</option></select>
        <select class="fsel" id="all-sort" onchange="renderAllTeams()">
          <option value="pov25">Over 2.5 %</option>
          <option value="pov15">Over 1.5 %</option>
          <option value="pbtts">BTTS %</option>
          <option value="mgf">Goles/partido</option>
          <option value="mcorn_own">Corners/partido</option>
          <option value="w">Victorias</option>
        </select>
      </div>
      <div class="tw"><table>
        <thead><tr>
          <th class="sortable" onclick="sortAllTeams('name')">Equipo</th>
          <th class="sortable" onclick="sortAllTeams('liga')">Liga</th>
          <th class="r sortable" onclick="sortAllTeams('p')">PJ</th>
          <th class="r sortable" onclick="sortAllTeams('w')">V</th>
          <th class="r sortable" onclick="sortAllTeams('d')">E</th>
          <th class="r sortable" onclick="sortAllTeams('l')">D</th>
          <th class="sortable" onclick="sortAllTeams('mgf')">Goles/p</th>
          <th class="sortable" onclick="sortAllTeams('pov15')">OV 1.5</th>
          <th class="sortable" onclick="sortAllTeams('pov25')">OV 2.5</th>
          <th class="sortable" onclick="sortAllTeams('pbtts')">BTTS</th>
          <th class="sortable" onclick="sortAllTeams('mcorn_own')">Corners/p</th>
        </tr></thead>
        <tbody id="all-teams-tbody"></tbody>
      </table></div>
    </div>

    <div class="panel" id="panel-team"><div id="team-content"></div></div>

    <div class="panel" id="panel-matches">
      <div class="phdr"><h2>Todos los Partidos</h2><div class="sub" id="m-sub"></div></div>
      <div class="frow">
        <select class="fsel" id="mf-liga" onchange="renderMatches()"><option value="">Todas las ligas</option></select>
        <select class="fsel" id="mf-team" onchange="renderMatches()"><option value="">Todos los equipos</option></select>
        <select class="fsel" id="mf-res" onchange="renderMatches()">
          <option value="">Resultado: todos</option>
          <option value="H">Victoria local</option>
          <option value="D">Empate</option>
          <option value="A">Victoria visitante</option>
        </select>
        <select class="fsel" id="mf-ov25" onchange="renderMatches()">
          <option value="">Over 2.5: todos</option>
          <option value="1">Solo Over 2.5 ✓</option>
          <option value="0">Solo Under 2.5</option>
        </select>
        <select class="fsel" id="mf-ov15" onchange="renderMatches()">
          <option value="">Over 1.5: todos</option>
          <option value="1">Solo Over 1.5 ✓</option>
          <option value="0">Solo Under 1.5</option>
        </select>
        <select class="fsel" id="mf-btts" onchange="renderMatches()">
          <option value="">BTTS: todos</option>
          <option value="1">Solo BTTS ✓</option>
          <option value="0">Solo No BTTS</option>
        </select>
        <span class="fcount" id="m-count"></span>
      </div>
      <div class="tw"><table>
        <thead><tr>
          <th class="sortable" onclick="sortMatchesByFecha()">Fecha <span id="mh-arr" style="color:var(--gr)">↓</span></th>
          <th>Liga</th><th>Local</th><th class="c">Res.</th><th>Visitante</th>
          <th class="r">Goles</th><th class="c">CL</th><th class="c">CV</th>
          <th class="c" style="color:var(--am)">TC</th>
          <th class="c">OV1.5</th><th class="c">OV2.5</th><th class="c">BTTS</th>
        </tr></thead>
        <tbody id="m-tbody"></tbody>
      </table></div>
      <div id="m-pag" style="display:flex;gap:8px;align-items:center;margin-top:10px;font-family:var(--fm);font-size:11px;color:var(--t3)"></div>
    </div>

  </div>
</div>

<div id="moverlay" onclick="if(event.target===this)closeMod()">
  <div id="modal"><button id="mcls" onclick="closeMod()">✕</button><div id="mbody"></div></div>
</div>

// ── SIDEBAR ──────────────────────────────────────────
function buildNav(){
  let h='';
  h+=`<div class="ni active" data-p="home" onclick="nav(this,'home')"><span class="ni-name">📊 Resumen 2025/26</span></div>`;
  h+=`<div class="ni" data-p="matches" onclick="nav(this,'matches')"><span class="ni-name">⚽ Todos los partidos</span><span class="ni-b">${D.matches.length}</span></div>`;
  ligas.forEach(lg=>{
    const color=LIGA_COLOR[lg]||'var(--t3)';
    h+=`<div class="ngl"><span class="ngl-dot" style="background:${color}"></span>${lg}</div>`;
    D.teams.filter(t=>t.liga===lg).sort((a,b)=>a.name.localeCompare(b.name)).forEach(t=>{
      const esc=t.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      h+=`<div class="ni" data-team="${t.name}" data-p="team" onclick="nav(this,'team','${esc}')"><span class="ni-name">${t.name}</span><span class="ni-b">${t.p}p</span></div>`;
    });
  });
  document.getElementById('navlist').innerHTML=h;
}
buildNav();

function filterNav(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('#navlist .ni').forEach(el=>{
    const n=(el.dataset.team||'').toLowerCase();
    el.style.display=(!q||n.includes(q))?'':'none';
  });
  document.querySelectorAll('.ngl').forEach(g=>{
    let nx=g.nextElementSibling,vis=false;
    while(nx&&!nx.classList.contains('ngl')){if(nx.style.display!=='none')vis=true;nx=nx.nextElementSibling;}
    g.style.display=vis?'':'none';
  });
}
function nav(el,panel,team){
  document.querySelectorAll('.ni').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');showPanel(panel,team);
}
function showPanel(p,team){
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  document.getElementById('panel-'+p).classList.add('active');
  if(p==='team'&&team)renderTeam(team);
  if(p==='matches')renderMatches();
  if(p==='home'){renderHome();renderAllTeams();}
}

function renderAllTeams(){
  const fLiga=document.getElementById('all-liga').value;
  const sortCol=atSort||document.getElementById('all-sort').value;
  let ts=[...D.teams].filter(t=>!fLiga||t.liga===fLiga);
  ts.sort((a,b)=>typeof a[sortCol]==='string'?a[sortCol].localeCompare(b[sortCol])*atDir:(b[sortCol]-a[sortCol])*atDir);

  document.getElementById('all-teams-tbody').innerHTML=ts.map(t=>{
    const esc=t.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

// ── MATCH ROW ────────────────────────────────────────
function matchRow(m,tname){
  const h=tname?m.local===tname:null;
  const gf=h===null?m.gl:(h?m.gl:m.gv);
  const gc=h===null?m.gv:(h?m.gv:m.gl);
  const opp=h===null?null:(h?m.visit:m.local);
  const rc=gf>gc?'bw':gf===gc?'bd':'bl';
  const rl=gf>gc?'V':gf===gc?'E':'D';
  const cOwn=h===null?m.cl:(h?m.cl:m.cv);
  const cOpp=h===null?m.cv:(h?m.cv:m.cl);
  const tcColor=m.tc>=12?'var(--gr)':m.tc>=9?'var(--am)':'var(--t2)';
  if(tname){
    return `<tr onclick="openMatch(${m.id})">
      <td class="mono dim">${m.fecha}</td>
      <td class="bold">${h?'<span style="color:var(--gr)">Local</span>':'Visitante'}</td>
      <td class="bold">${opp}</td>
      <td class="c"><span class="bdg ${rc}">${rl} ${gf}–${gc}</span></td>
      <td class="mono r">${m.tg}</td>
      <td class="mono c">${cOwn}</td><td class="mono c">${cOpp}</td>
      <td class="mono c" style="color:${tcColor};font-weight:600">${m.tc}</td>
      <td class="c">${m.ov15?'<span class="bdg ov">OV</span>':'<span class="bdg un">UN</span>'}</td>
      <td class="c">${m.ov25?'<span class="bdg ov">OV</span>':'<span class="bdg un">UN</span>'}</td>
      <td class="c">${m.btts?'<span class="bdg yy">SÍ</span>':'<span class="bdg nn">NO</span>'}</td>
    </tr>`;
  }else{
    const lshort=LIGA_SHORT[m.liga]||m.liga;
    const lcolor=LIGA_COLOR[m.liga]||'var(--t3)';
    return `<tr onclick="openMatch(${m.id})">
      <td class="mono dim">${m.fecha}</td>
      <td><span style="font-family:var(--fm);font-size:9px;padding:1px 5px;border-radius:3px;background:${lcolor}18;color:${lcolor}">${lshort}</span></td>
      <td class="bold">${m.local}</td>
      <td class="c"><span class="bdg ${rc}">${m.gl}–${m.gv}</span></td>
      <td class="bold" style="color:var(--t2)">${m.visit}</td>
      <td class="mono r">${m.tg}</td>
      <td class="mono c">${m.cl}</td><td class="mono c">${m.cv}</td>
      <td class="mono c" style="color:${tcColor};font-weight:600">${m.tc}</td>
      <td class="c">${m.ov15?'<span class="bdg ov">OV</span>':'<span class="bdg un">UN</span>'}</td>
      <td class="c">${m.ov25?'<span class="bdg ov">OV</span>':'<span class="bdg un">UN</span>'}</td>
      <td class="c">${m.btts?'<span class="bdg yy">SÍ</span>':'<span class="bdg nn">NO</span>'}</td>
    </tr>`;
  }
}

  const hms=ms.filter(m=>m.local===name),ams=ms.filter(m=>m.visit===name);
  function sp(arr){
    if(!arr.length)return{p:0,w:0,d:0,l:0,gf:0,ga:0,ov15:0,ov25:0,btts:0,cl:0};
    return arr.reduce((a,m)=>{
      const h=m.local===name,gf=h?m.gl:m.gv,ga=h?m.gv:m.gl,cOwn=h?m.cl:m.cv;
      a.p++;a.gf+=gf;a.ga+=ga;a.cl+=cOwn;
      a.ov15+=m.ov15;a.ov25+=m.ov25;a.btts+=m.btts;
      if(gf>ga)a.w++;else if(gf===ga)a.d++;else a.l++;return a;
    },{p:0,w:0,d:0,l:0,gf:0,ga:0,ov15:0,ov25:0,btts:0,cl:0});
  }
  const H=sp(hms),A=sp(ams);
  const pct=(n,d)=>d?((n/d)*100).toFixed(1):'0.0';
  const avg=(n,d)=>d?(n/d).toFixed(2):'0.00';
  const lcolor=LIGA_COLOR[t.liga]||'var(--gr)';
  document.getElementById('team-content').innerHTML=`
    <div class="phdr">
      <div class="ltag" style="border-color:${lcolor}40;color:${lcolor};background:${lcolor}12">${t.liga}</div>
      <h2>${name}</h2><div class="sub">${t.p} PARTIDOS · TEMPORADA 2025/26</div>
    </div>
    <div class="sg5">
      <div class="sc ov"><div class="sc-v">${t.pov25}<span class="p">%</span></div><div class="sc-l">Over 2.5</div><div class="sc-s">Sus partidos</div></div>
      <div class="sc ov"><div class="sc-v">${t.pov15}<span class="p">%</span></div><div class="sc-l">Over 1.5</div><div class="sc-s">Sus partidos</div></div>
      <div class="sc bt"><div class="sc-v">${t.pbtts}<span class="p">%</span></div><div class="sc-l">BTTS</div><div class="sc-s">Ambos marcan</div></div>
      <div class="sc am"><div class="sc-v">${t.mgf}<span class="u"> gol</span></div><div class="sc-l">Goles/partido</div><div class="sc-s">Media anotados</div></div>
      <div class="sc"><div class="sc-v">${t.mcorn_own}<span class="u"> c</span></div><div class="sc-l">Corners/p</div><div class="sc-s">Propios media</div></div>
    </div>
    <div class="wdl">
      <div class="wdl-lbl">Victorias · Empates · Derrotas — ${t.w}V ${t.d}E ${t.l}D</div>
      <div class="wdl-bar">
        <div class="ws w" style="flex:${t.w||.1}">${t.w} V (${wP}%)</div>
        <div class="ws d" style="flex:${t.d||.1}">${t.d} E</div>
        <div class="ws l" style="flex:${t.l||.1}">${t.l} D (${lP}%)</div>
      </div>
      <div class="wdl-leg">
        <span><span class="dot" style="background:var(--gr)"></span>${t.w} victorias</span>
        <span><span class="dot" style="background:var(--t3)"></span>${t.d} empates</span>
        <span><span class="dot" style="background:var(--rd)"></span>${t.l} derrotas</span>
      </div>
    </div>
    <div class="slbl">Local vs Visitante</div>
    <div class="tw"><table>
      <thead><tr>
        <th>Condición</th><th class="r">PJ</th><th class="r">V</th><th class="r">E</th><th class="r">D</th>
        <th>Goles/p</th><th>GC/p</th><th>OV 1.5</th><th>OV 2.5</th><th>BTTS</th><th>Corners/p</th>
      </tr></thead>
      <tbody>
        <tr>
          <td class="bold" style="color:var(--gr)">Local</td>
          <td class="mono r">${H.p}</td><td class="mono r gr">${H.w}</td><td class="mono r">${H.d}</td><td class="mono r rd2">${H.l}</td>
          <td><span class="mono am2">${avg(H.gf,H.p)}</span></td><td><span class="mono">${avg(H.ga,H.p)}</span></td>
          <td><div class="pb"><div class="pbt"><div class="pbf" style="width:${pct(H.ov15,H.p)}%"></div></div><span class="pbv">${pct(H.ov15,H.p)}%</span></div></td>
          <td><div class="pb"><div class="pbt"><div class="pbf" style="width:${pct(H.ov25,H.p)}%"></div></div><span class="pbv">${pct(H.ov25,H.p)}%</span></div></td>
          <td><div class="pb"><div class="pbt"><div class="pbf c" style="width:${pct(H.btts,H.p)}%"></div></div><span class="pbv">${pct(H.btts,H.p)}%</span></div></td>
          <td><span class="mono">${avg(H.cl,H.p)}</span></td>
        </tr>
        <tr>
          <td class="bold" style="color:var(--cy)">Visitante</td>
          <td class="mono r">${A.p}</td><td class="mono r gr">${A.w}</td><td class="mono r">${A.d}</td><td class="mono r rd2">${A.l}</td>
          <td><span class="mono am2">${avg(A.gf,A.p)}</span></td><td><span class="mono">${avg(A.ga,A.p)}</span></td>
          <td><div class="pb"><div class="pbt"><div class="pbf" style="width:${pct(A.ov15,A.p)}%"></div></div><span class="pbv">${pct(A.ov15,A.p)}%</span></div></td>
          <td><div class="pb"><div class="pbt"><div class="pbf" style="width:${pct(A.ov25,A.p)}%"></div></div><span class="pbv">${pct(A.ov25,A.p)}%</span></div></td>
          <td><div class="pb"><div class="pbt"><div class="pbf c" style="width:${pct(A.btts,A.p)}%"></div></div><span class="pbv">${pct(A.btts,A.p)}%</span></div></td>
          <td><span class="mono">${avg(A.cl,A.p)}</span></td>
        </tr>
      </tbody>
    </table></div>
    <div class="slbl">Últimos 25 Partidos <span style="font-weight:400;font-size:9px;margin-left:6px;color:var(--t3)">— clic para ver detalle</span></div>
    <div class="tw"><table>
      <thead><tr>
        <th class="sortable" onclick="toggleTeamSort()">Fecha <span id="t-arr" style="color:var(--gr)">↓</span></th>
        <th>Cond.</th><th>Rival</th><th class="c">Res.</th>
        <th class="r">Goles</th><th class="c">CL</th><th class="c">CV</th>
        <th class="c" style="color:var(--am)">TC</th>
        <th class="c">OV1.5</th><th class="c">OV2.5</th><th class="c">BTTS</th>
      </tr></thead>
      <tbody id="t-tbody"></tbody>
    </table></div>`;
  document.getElementById('t-tbody').innerHTML=_tMatches.map(m=>matchRow(m,name)).join('');
}
function toggleTeamSort(){
  _tDir*=-1;_tMatches.sort((a,b)=>(b.ts-a.ts)*_tDir);
  document.getElementById('t-tbody').innerHTML=_tMatches.map(m=>matchRow(m,_tName)).join('');
  document.getElementById('t-arr').textContent=_tDir===-1?'↓':'↑';
}

// ── MATCHES PANEL ────────────────────────────────────
let mPage=0,mDir=-1,mFiltered=[];
const PS=60;
function sortMatchesByFecha(){
  mDir*=-1;mFiltered.sort((a,b)=>(b.ts-a.ts)*mDir);mPage=0;
  document.getElementById('mh-arr').textContent=mDir===-1?'↓':'↑';
  renderMPage();
}
function renderMatches(){mPage=0;mDir=-1;buildMFiltered();document.getElementById('mh-arr').textContent='↓';renderMPage();}
function buildMFiltered(){
  const fl=document.getElementById('mf-liga').value;
  const ft=document.getElementById('mf-team').value;
  const fr=document.getElementById('mf-res').value;
  const fo25=document.getElementById('mf-ov25').value;
  const fo15=document.getElementById('mf-ov15').value;
  const fb=document.getElementById('mf-btts').value;
  mFiltered=[...D.matches].filter(m=>
    (!fl||m.liga===fl)&&(!ft||m.local===ft||m.visit===ft)&&(!fr||m.res===fr)&&
    (fo25===''||m.ov25===parseInt(fo25))&&(fo15===''||m.ov15===parseInt(fo15))&&
    (fb===''||m.btts===parseInt(fb))
  );
  mFiltered.sort((a,b)=>b.ts-a.ts);
}
function renderMPage(){
  const tot=mFiltered.length,tp=Math.ceil(tot/PS),st=mPage*PS;
  document.getElementById('m-sub').textContent=`${tot.toLocaleString('es-ES')} PARTIDOS`;
  document.getElementById('m-count').textContent=tot+' partidos';
  document.getElementById('m-tbody').innerHTML=mFiltered.slice(st,st+PS).map(m=>matchRow(m,null)).join('');
  const pg=document.getElementById('m-pag');
  if(tp<=1){pg.innerHTML='';return;}
  const bs='padding:5px 11px;background:var(--card2);border:1px solid var(--b2);border-radius:5px;color:var(--t2);cursor:pointer;font-family:var(--fm);font-size:11px';
  let b=`<span>${(st+1).toLocaleString()}–${Math.min(st+PS,tot).toLocaleString()} de ${tot.toLocaleString()}</span>`;
  if(mPage>0)b+=`<button style="${bs}" onclick="mPage--;renderMPage()">← Anterior</button>`;
  if(mPage<tp-1)b+=`<button style="${bs}" onclick="mPage++;renderMPage()">Siguiente →</button>`;
  b+=`<span>Página ${mPage+1}/${tp}</span>`;
  pg.innerHTML=b;
}

// ── MODAL ────────────────────────────────────────────
function openMatch(id){
  const m=matchById[id];if(!m)return;
  const res=m.res==='H'?'Victoria Local':m.res==='D'?'Empate':'Victoria Visitante';
  const rc=m.res==='H'?'var(--gr)':m.res==='D'?'var(--am)':'var(--cy)';
  document.getElementById('mbody').innerHTML=`
    <div class="m-date">${m.fecha}</div>
    <div class="m-liga">${m.liga}</div>
    <div class="m-sb">
      <div class="m-team"><div class="m-tname">${m.local}</div><div class="m-trole">LOCAL</div></div>
      <div class="m-score">${m.gl}<span class="m-dash">–</span>${m.gv}</div>
      <div class="m-team"><div class="m-tname">${m.visit}</div><div class="m-trole">VISITANTE</div></div>
    </div>
    <div class="m-res" style="color:${rc}">${res}</div>
    <div class="m-grid">
      <div class="mst"><div class="mst-v" style="color:var(--gr)">${m.tg}</div><div class="mst-l">Goles totales</div></div>
      <div class="mst"><div class="mst-v">${m.gl}</div><div class="mst-l">Goles local</div></div>
      <div class="mst"><div class="mst-v">${m.gv}</div><div class="mst-l">Goles visitante</div></div>
      <div class="mst"><div class="mst-v" style="color:var(--am)">${m.tc}</div><div class="mst-l">Corners totales</div></div>
      <div class="mst"><div class="mst-v">${m.cl}</div><div class="mst-l">Corners ${m.local.split(' ')[0]}</div></div>
      <div class="mst"><div class="mst-v">${m.cv}</div><div class="mst-l">Corners ${m.visit.split(' ')[0]}</div></div>
    </div>
    <div class="m-bdgs">
      ${m.ov15?'<span class="bdg ov" style="font-size:11px;padding:4px 13px">✓ Over 1.5</span>':'<span class="bdg un" style="font-size:11px;padding:4px 13px">✗ Under 1.5</span>'}
      ${m.ov25?'<span class="bdg ov" style="font-size:11px;padding:4px 13px">✓ Over 2.5</span>':'<span class="bdg un" style="font-size:11px;padding:4px 13px">✗ Under 2.5</span>'}
      ${m.btts?'<span class="bdg yy" style="font-size:11px;padding:4px 13px">✓ BTTS</span>':'<span class="bdg nn" style="font-size:11px;padding:4px 13px">✗ No BTTS</span>'}
      ${m.tg>=4?'<span class="bdg ov" style="font-size:11px;padding:4px 13px">Over 3.5</span>':''}
      ${m.tg>=5?'<span class="bdg ov" style="font-size:11px;padding:4px 13px">Over 4.5</span>':''}
      ${m.tc>=10?'<span class="bdg yy" style="font-size:11px;padding:4px 13px">+9.5 corners</span>':''}
    </div>`;
  document.getElementById('moverlay').classList.add('show');
}
function closeMod(){document.getElementById('moverlay').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMod();});
</script>
</body>
